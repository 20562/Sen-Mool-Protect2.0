name: senmool_mobile
description: SEN-MOOL PROTECT 2.0 - Maritime IoT Safety App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  google_maps_flutter: ^2.2.0
  location: ^4.4.0
  geolocator: ^9.0.0

  # Networking & Real-time
  socket_io_client: ^2.0.0
  http: ^1.1.0
  mqtt_client: ^10.0.0

  # State Management
  provider: ^6.0.0
  get: ^4.6.0

  # Data Persistence
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  hive: ^2.2.0

  # Notifications
  firebase_messaging: ^14.6.0
  awesome_notifications: ^0.7.0

  # Utilities
  intl: ^0.18.0
  logger: ^2.0.0
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
