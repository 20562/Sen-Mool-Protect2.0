name: senmool_mobile
description: SEN-MOOL PROTECT 2.0 - Maritime IoT Safety App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.0
  flutter_svg: ^2.0.0
  go_router: ^12.0.0

  # Real-time communication
  socket_io_client: ^2.0.3
  web_socket_channel: ^2.4.0

  # State management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  state_notifier: ^1.0.0
  provider: ^6.0.0

  # API & HTTP
  dio: ^5.3.0
  retrofit: ^4.1.0
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Location & Geolocation
  geolocator: ^9.0.0
  location: ^4.4.0

  # Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.0.0
  awesome_notifications: ^0.7.0

  # Storage & Preferences
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0

  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  permission_handler: ^11.4.0
  uuid: ^4.0.0
  logger: ^2.0.0

  # UI Components
  cupertino_icons: ^1.0.0
  flutter_spinkit: ^5.2.0
  skeletonizer: ^0.7.0
  lottie: ^2.3.0
  connectivity_plus: ^5.0.0

  # Error handling & monitoring
  sentry_flutter: ^7.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.1
  json_serializable: ^6.7.0
  retrofit_generator: ^7.0.0
  mockito: ^5.4.0
  mocktail: ^1.0.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
