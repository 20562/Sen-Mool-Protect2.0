version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:5.0
    container_name: senmool-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-change_me}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - senmool-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: senmool-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    networks:
      - senmool-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: senmool-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      MONGODB_URI: mongodb://admin:${MONGODB_PASSWORD:-change_me}@mongodb:27017/senmool
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key}
      TWILIO_SID: ${TWILIO_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      mongodb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - senmool-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Fall Detection ML Service
  ml-fall:
    build:
      context: ./ml
      dockerfile: Dockerfile.fall
    container_name: senmool-ml-fall
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MODEL_PATH: /app/models/fall_detection_model.pkl
    depends_on:
      - mosquitto
    networks:
      - senmool-network

  # Anomaly Detection ML Service
  ml-anomaly:
    build:
      context: ./ml
      dockerfile: Dockerfile.anomaly
    container_name: senmool-ml-anomaly
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
    depends_on:
      - mosquitto
    networks:
      - senmool-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: senmool-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - senmool-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: senmool-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - senmool-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: senmool-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - senmool-network

volumes:
  mongodb_data:
  mosquitto_data:
  prometheus_data:
  grafana_data:

networks:
  senmool-network:
    driver: bridge
